packages:
  - "apps/*"
  - "layers/*"
  - "packages/*"
  - "scripts"
  - "skills/*"

catalog:
  "@antfu/eslint-config": ^9.0.0
  "@types/node": ^22.0.0
  eslint: ^10.5.0
  tsx: ^4.0.0
  typescript: ^6.0.3
  vitest: ^4.1.9
  zod: ^4.4.0

# Supply-chain guardrails. pnpm 11 reads settings from here, not the package.json
# "pnpm" field.
#
# pnpm 11 ERRORS (ERR_PNPM_IGNORED_BUILDS) on any dependency install-time build
# script that has no explicit allow/deny decision — that error is the guardrail.
# Every build script must be vetted and recorded here.
allowBuilds:
  # simple-git-hooks' postinstall installs our git hooks — vetted and allowed.
  simple-git-hooks: true
  # esbuild (via tsx, the CLI's TS runner) downloads its platform binary on install —
  # vetted and allowed. tsx runs scripts/octowiz.ts since the workspace uses extensionless
  # TS imports that node's ESM resolver can't load directly.
  esbuild: true
#
# Wait 24h before installing a newly published version (catch compromised releases).
minimumReleaseAge: 1440
